<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lytiškumo pažinimo pagalbininkas</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: #dbeafe;
      padding: 18px;
      text-align: center;
      font-weight: 700;
      font-size: 22px;
    }

    .screen {
      padding: 22px;
      min-height: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .avatar {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: #fef3c7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 84px;
      border: 6px solid #fde68a;
      user-select: none;
    }

    .bubble {
      width: 100%;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 18px;
      padding: 18px;
      font-size: 22px;
      line-height: 1.4;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint {
      color: #6b7280;
      font-size: 15px;
      text-align: center;
    }

    .buttons {
      width: 100%;
      display: grid;
      gap: 12px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: transform 0.08s ease, opacity 0.15s ease;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: scale(0.98); }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .green { background: #16a34a; }
    .yellow { background: #ca8a04; }
    .red { background: #dc2626; }
    .purple { background: #7c3aed; }

    .footer {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: auto;
    }

    .footer button {
      font-size: 18px;
      padding: 14px;
    }

    @media (max-width: 520px) {
      body { padding: 10px; }
      .screen { min-height: 560px; padding: 16px; }
      .bubble { font-size: 20px; }
      button { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">Pažinimo pagalbininkas</div>
    <div class="screen">
      <div class="avatar" id="avatar">🙂</div>
      <div class="bubble" id="text">Привет! Я могу помочь понять разные ситуации.</div>
      <div class="hint" id="hint">Paspausk mygtuką ir pasirink temą.</div>
      <div class="buttons" id="buttons"></div>
      <div class="footer">
        <button class="secondary" onclick="goHome()">🏠 Pradžia</button>
        <button class="secondary" onclick="repeatText()">🔊 Pakartoti</button>
      </div>
    </div>
  </div>

  <script>
    msg.lang = 'lt-LT';
    let speechEnabled = true;

    function speak(text) {
      currentText = text;
      if (!speechEnabled || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'lt-LT';
      msg.rate = 0.95;
      speechSynthesis.speak(msg);
    }

    function setScene(avatar, text, hint, buttonsHtml) {
      document.getElementById('avatar').textContent = avatar;
      document.getElementById('text').textContent = text;
      document.getElementById('hint').textContent = hint;
      document.getElementById('buttons').innerHTML = buttonsHtml;
      speak(text);
    }

    function repeatText() {
      speak(currentText);
    }

    function goHome() {
      setScene(
        '🙂',
        'Labas! Aš galiu padėti suprasti įvairias situacijas.',
        'Pasirink vieną iš trijų scenarijų.',
        `
          <button onclick="startBodyScenario()">🤔 Mano kūnas keičiasi</button>
          <button class="purple" onclick="startBoundaryScenario()">✋ Asmeninės ribos</button>
          <button class="green" onclick="startHelpScenario()">🆘 Kada reikia pagalbos</button>
        `
      );
    }

    function startBodyScenario() {
      setScene(
        '😳',
        'Kartais mano kūnas elgiasi keistai. Ar tai normalu?',
        'Pasirink atsakymą.',
        `
          <button class="green" onclick="bodyYes()">👍 Taip</button>
          <button class="yellow" onclick="bodyNotSure()">❓ Nežinau</button>
          <button class="secondary" onclick="goHome()">⬅ Atgal</button>
        `
      );
    }

    function bodyYes() {
      setScene(
        '😊',
        'Taip. Kūnas gali keistis ir įvairiai reaguoti. Tai gali būti normalu.',
        'Paprastas ir ramus paaiškinimas sumažina nerimą.',
        `
          <button onclick="startBodyScenario()">🔁 Pakartoti scenarijų</button>
          <button class="secondary" onclick="goHome()">🏠 Į meniu</button>
        `
      );
    }

    function bodyNotSure() {
      setScene(
        '🙂',
        'Jei nesi tikras, gali paklausti suaugusiojo, kuriuo pasitiki.',
        'Programėlė sudėtingoje situacijoje nepakeičia suaugusiojo.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Kam galiu pasakyti</button>
          <button class="secondary" onclick="goHome()">🏠 В меню</button>
        `
      );
    }

    function startBoundaryScenario() {
      setScene(
        '😟',
        'Jei man nemalonu, kai mane liečia, ką daryti?',
        'Pasirink saugų veiksmą.',
        `
          <button class="red" onclick="boundaryStop()">✋ Pasakyti „ne“</button>
          <button class="yellow" onclick="boundaryFreeze()">😶 Tylėti</button>
          <button class="secondary" onclick="goHome()">⬅ Назад</button>
        `
      );
    }

    function boundaryStop() {
      setScene(
        '😌',
        'Teisingai. Gali pasakyti „ne“, pasitraukti ir pakviesti suaugusįjį, kuriuo pasitiki.',
        'Šis scenarijus moko asmeninių ribų.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Pakviesti suaugusįjį</button>
          <button class="secondary" onclick="goHome()">🏠 В меню</button>
        `
      );
    }

    function boundaryFreeze() {
      setScene(
        '😐',
        'Kartais žmonės tyli iš baimės. Bet vėliau svarbu pasakyti suaugusiajam, kuriuo pasitiki.',
        'Čia nėra bausmės už klaidą, tik švelni pagalba.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Pasakyti suaugusiajam</button>
          <button class="secondary" onclick="goHome()">🏠 В меню</button>
        `
      );
    }

    function startHelpScenario() {
      setScene(
        '😰',
        'Man baisu arba neaišku. Į ką galiu kreiptis?',
        'Pasirink variantą.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Patikimas suaugusysis</button>
          <button class="yellow" onclick="helpRandom()">🎲 Bet kuris nepažįstamas žmogus</button>
          <button class="secondary" onclick="goHome()">⬅ Назад</button>
        `
      );
    }

    function showTrustedAdult() {
      setScene(
        '🙂',
        'Gali kreiptis į mamą, tėtį, globėją, mokytoją ar kitą suaugusįjį, kuriuo pasitiki.',
        'Tikroje programėlėje čia galėtų būti nuotraukos ir pagalbos mygtukas.',
        `
          <button class="green" onclick="fakeCall()">📞 Kviesti pagalbą</button>
          <button class="secondary" onclick="goHome()">🏠 В меню</button>
        `
      );
    }

    function helpRandom() {
      setScene(
        '😕',
        'Ne kiekvienas nepažįstamas žmogus yra saugus. Geriau pasirinkti patikimą suaugusįjį.',
        'Programėlė švelniai nukreipia į saugų pasirinkimą.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Pasirinkti patikimą suaugusįjį</button>
          <button class="secondary" onclick="goHome()">🏠 В меню</button>
        `
      );
    }

    function fakeCall() {
      setScene(
        '📞',
        'Pagalba iškviesta. Tikroje versijoje čia galėtų būti ryšys su iš anksto pasirinktu kontaktu.',
        'Prototipui to pakanka, kad parodytų idėją.',
        `
          <button onclick="goHome()">🏠 Grįžti į meniu</button>
        `
      );
    }

    goHome();
  </script>
</body>
</html>
