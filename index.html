<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pažinimo pagalbininkas — labai paprasta versija</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #16a34a;
      --soft: #f9fafb;
      --warning: #fef3c7;
      --warning-line: #f59e0b;
      --danger-soft: #fee2e2;
      --danger-line: #dc2626;
      --purple-soft: #ede9fe;
      --purple-line: #7c3aed;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .app {
      width: 100%;
      max-width: 540px;
      min-height: calc(100vh - 24px);
      background: var(--card);
      border-radius: 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--blue-soft);
      padding: 18px 16px;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.1px;
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 18px;
    }

    .progress {
      width: 100%;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      min-height: 20px;
    }

    .bar {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--blue);
      transition: width 0.2s ease;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #fef3c7;
      border: 6px solid #fde68a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 66px;
      user-select: none;
      flex-shrink: 0;
    }

    .card {
      width: 100%;
      background: var(--soft);
      border: 2px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
    }

    .card.warning {
      background: var(--warning);
      border-color: var(--warning-line);
    }

    .card.danger {
      background: var(--danger-soft);
      border-color: var(--danger-line);
    }

    .card.private {
      background: var(--purple-soft);
      border-color: var(--purple-line);
    }

    .topic-title {
      font-size: 21px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .text {
      font-size: 25px;
      line-height: 1.32;
      font-weight: 800;
      margin: 0;
    }

    .more-text {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px solid rgba(17, 24, 39, 0.08);
      font-size: 22px;
      line-height: 1.35;
      font-weight: 700;
    }

    .tiny-hint {
      color: var(--muted);
      font-size: 14px;
      min-height: 18px;
      text-align: center;
    }

    .buttons {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: auto;
      padding-top: 6px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px 14px;
      min-height: 72px;
      font-size: 23px;
      font-weight: 900;
      color: white;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.15s ease;
    }

    button:active { transform: scale(0.98); }
    button:focus-visible { outline: 4px solid #f97316; outline-offset: 3px; }

    .more-btn { background: var(--green); }
    .next-btn { background: var(--blue); }

    .speak-note {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      margin-top: 2px;
    }

    @media (max-width: 540px) {
      body { padding: 8px; }
      .app { min-height: calc(100vh - 16px); border-radius: 22px; }
      .screen { padding: 14px; }
      .avatar { width: 124px; height: 124px; font-size: 58px; }
      .text { font-size: 22px; }
      .more-text { font-size: 20px; }
      button { font-size: 21px; min-height: 68px; }
    }
  </style>
</head>

    const hint = document.getElementById('hint');
    const audioPlayer = document.getElementById('audioPlayer');

    function render() {
      const topic = topics[index];
      const progressNumber = Math.min(index + 1, topics.length);
      const percent = ((progressNumber - 1) / (topics.length - 1)) * 100;

      progressText.textContent = `Kortelė ${progressNumber} iš ${topics.length}`;
      barFill.style.width = `${percent}%`;
      avatar.textContent = topic.icon;
      topicTitle.textContent = topic.title;
      mainText.textContent = topic.short;
      moreText.hidden = true;
      moreText.textContent = '';
      moreIndex = -1;

      card.className = 'card';
      if (topic.tone === 'warning') card.classList.add('warning');
      if (topic.tone === 'danger') card.classList.add('danger');
      if (topic.tone === 'private') card.classList.add('private');

      hint.textContent = 'Spausk „Noriu sužinoti daugiau“ arba „Toliau“.';

      // Kortelės garsas turi perskaityti temą, pagrindinį tekstą ir abu pasirinkimus.
      currentText = `${topic.title}. ${topic.short}. Pasirinkimai: Noriu sužinoti daugiau. Toliau.`;
      speak(currentText, getCardAudio(topic));
    }

    function showMore() {
      const topic = topics[index];
      if (!topic.more || topic.more.length === 0) {
        moreText.hidden = false;
        moreText.textContent = 'Daugiau apie šią temą nėra. Spausk „Toliau“.';
        currentText = moreText.textContent;
        speak(currentText);
        return;
      }

      if (moreIndex < topic.more.length - 1) {
        moreIndex += 1;
      }

      moreText.hidden = false;
      moreText.textContent = topic.more[moreIndex];

      if (moreIndex < topic.more.length - 1) {
        hint.textContent = 'Gali spausti „Noriu sužinoti daugiau“ dar kartą.';
      } else {
        hint.textContent = 'Dabar gali spausti „Toliau“.';
      }

      // Paspaudus „Noriu sužinoti daugiau“, garsas skaito tik naują papildomą tekstą.
      currentText = moreText.textContent;
      speak(currentText, getMoreAudio(topic, moreIndex));
    }

    function nextCard() {
      index += 1;
      if (index >= topics.length) index = 0;
      render();
    }

    function repeatText() {
      if (currentAudioSrc) {
        playAudio(currentAudioSrc);

    }

    function getCardAudio(topic) {
      return topic.audio && topic.audio.card ? topic.audio.card : '';
    }

    function getMoreAudio(topic, moreNumber) {
      if (!topic.audio || !Array.isArray(topic.audio.more)) return '';
      return topic.audio.more[moreNumber] || '';
    }

    function speak(text, audioSrc = '') {
      currentText = text;
      currentAudioSrc = audioSrc || '';

      // TTS sąmoningai nenaudojamas: lietuvių kalbai naudojami iš anksto įrašyti MP3.
      if (!currentAudioSrc) return;

      playAudio(currentAudioSrc);
    }

    function playAudio(src) {
      if (!src || !audioPlayer) return;

      pendingAudioSrc = src;

      audioPlayer.pause();
      audioPlayer.currentTime = 0;
      audioPlayer.src = src;
      audioPlayer.load();

      const playPromise = audioPlayer.play();

      // Naršyklė gali blokuoti automatinį garsą iki pirmo naudotojo paspaudimo.
      // Jei taip nutinka, įsimename garsą ir bandome dar kartą po vartotojo paspaudimo.
      if (playPromise && typeof playPromise.then === 'function') {
        playPromise
          .then(() => {
            if (pendingAudioSrc === src) pendingAudioSrc = '';
          })
          .catch(() => {
            pendingAudioSrc = src;
          });
      }
    }

    // Pirmą kartą paspaudus bet kur programoje, naršyklė jau leidžia garsą.
    // Tai padeda, jei pradinis kortelės garsas buvo užblokuotas automatiškai.
    document.addEventListener('click', () => {
      if (!pendingAudioSrc) return;
      const src = pendingAudioSrc;
      pendingAudioSrc = '';
      playAudio(src);
    }, true);

    function saveProgress() {
      // Sąmoningai nesaugome kortelės numerio.
      // Paprasta versija visada turi prasidėti nuo pirmos kortelės.
      try { localStorage.removeItem('pazinimo_pagalbininkas_v3_index'); } catch (e) {}
    }

    function loadProgress() {
      // Anksčiau naršyklė galėjo prisiminti antrą ar kitą kortelę.
      // Dabar kiekvienas paleidimas prasideda nuo 1 kortelės.
      index = 0;
      try { localStorage.removeItem('pazinimo_pagalbininkas_v3_index'); } catch (e) {}
    }

    loadProgress();
    render();
  </script>
</body>
</html>
