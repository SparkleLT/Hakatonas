<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pažinimo pagalbininkas</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: #dbeafe;
      padding: 18px;
      text-align: center;
      font-weight: 800;
      font-size: 22px;
    }

    .screen {
      padding: 20px;
      min-height: 690px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 152px;
      height: 152px;
      border-radius: 50%;
      background: #fef3c7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 78px;
      border: 6px solid #fde68a;
      user-select: none;
    }

    .bubble {
      width: 100%;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 18px;
      padding: 17px;
      font-size: 22px;
      line-height: 1.35;
      text-align: center;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint {
      color: #6b7280;
      font-size: 15px;
      text-align: center;
      min-height: 20px;
    }

    .buttons {
      width: 100%;
      display: grid;
      gap: 12px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: transform 0.08s ease, opacity 0.15s ease;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: scale(0.98); }

    .secondary { background: #e5e7eb; color: #111827; }
    .green { background: #16a34a; }
    .yellow { background: #ca8a04; }
    .red { background: #dc2626; }
    .purple { background: #7c3aed; }
    .soft { background: #0f766e; }

    .body-map {
      width: 250px;
      height: 360px;
      position: relative;
      margin: 4px auto 8px;
      border-radius: 20px;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
    }

    .head, .torso, .pelvis, .arm, .leg {
      position: absolute;
      background: #fde68a;
      border: 3px solid #f59e0b;
    }

    .head {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      left: 92px;
      top: 18px;
    }

    .torso {
      width: 86px;
      height: 122px;
      border-radius: 36px 36px 24px 24px;
      left: 82px;
      top: 92px;
    }

    .pelvis {
      width: 74px;
      height: 50px;
      border-radius: 18px 18px 28px 28px;
      left: 88px;
      top: 210px;
    }

    .arm.left { width: 36px; height: 132px; border-radius: 18px; left: 42px; top: 106px; transform: rotate(10deg); }
    .arm.right { width: 36px; height: 132px; border-radius: 18px; right: 42px; top: 106px; transform: rotate(-10deg); }
    .leg.left { width: 38px; height: 92px; border-radius: 18px; left: 82px; top: 256px; }
    .leg.right { width: 38px; height: 92px; border-radius: 18px; right: 82px; top: 256px; }

    .zone {
      position: absolute;
      z-index: 2;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.18);
      border: 2px dashed rgba(37, 99, 235, 0.55);
      color: #1d4ed8;
      font-size: 13px;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      font-weight: 800;
    }

    .zone:hover { background: rgba(37, 99, 235, 0.28); }
    .zone-head { width: 78px; height: 78px; left: 86px; top: 12px; }
    .zone-hand-left { width: 66px; height: 48px; left: 14px; top: 208px; }
    .zone-hand-right { width: 66px; height: 48px; right: 14px; top: 208px; }
    .zone-chest { width: 92px; height: 62px; left: 79px; top: 104px; }
    .zone-belly { width: 92px; height: 58px; left: 79px; top: 164px; }
    .zone-private { width: 94px; height: 58px; left: 78px; top: 222px; background: rgba(220, 38, 38, 0.14); border-color: rgba(220, 38, 38, 0.55); color: #991b1b; }

    .footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      margin-top: auto;
    }

    .footer button {
      font-size: 17px;
      padding: 13px;
    }

    .small-note {
      width: 100%;
      background: #eef2ff;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      color: #3730a3;
      text-align: center;
    }

    @media (max-width: 540px) {
      body { padding: 8px; }
      .screen { min-height: 640px; padding: 15px; }
      .bubble { font-size: 20px; }
      button { font-size: 19px; }
      .avatar { width: 132px; height: 132px; font-size: 66px; }
      .body-map { transform: scale(0.92); margin: -8px auto -12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">Pažinimo pagalbininkas</div>
    <div class="screen">
      <div class="avatar" id="avatar">🙂</div>
      <div class="bubble" id="text">Labas! Aš galiu padėti suprasti įvairias situacijas.</div>
      <div class="hint" id="hint">Atsakyk į kelis paprastus klausimus.</div>
      <div class="buttons" id="buttons"></div>
      <div class="footer">
        <button class="secondary" onclick="goHome()">🏠 Pradžia</button>
        <button class="secondary" onclick="repeatText()">🔊 Pakartoti</button>
      </div>
    </div>
  </div>

  <script>
    let currentText = 'Labas! Aš galiu padėti suprasti įvairias situacijas.';
    let simpleHelpText = 'Pasakysiu paprasčiau. Jei neaišku, gali rinktis saugų atsakymą arba kreiptis į suaugusįjį.';

    const userProfile = {
      level: 'medium',
      format: 'visual_voice',
      mood: 'good'
    };

    const levelText = {
      simple: {
        bodyNormal: 'Tavo kūnas kartais keičiasi. Tai gerai.',
        touchOk: 'Jei tau malonu ir saugu, gali būti gerai.',
        touchNo: 'Jei tau nemalonu, sakyk „ne“.',
        notSure: 'Gali pasakyti suaugusiajam.',
        private: 'Tai privati vieta. Ne visi gali ją liesti.'
      },
      medium: {
        bodyNormal: 'Kūnas gali keistis ir įvairiai reaguoti. Tai gali būti normalu.',
        touchOk: 'Jei tau malonu ir tu jautiesi saugiai, tai gali būti gerai.',
        touchNo: 'Jei tau nemalonu, gali sakyti „ne“ ir pasitraukti.',
        notSure: 'Jei nežinai, gali paklausti suaugusiojo, kuriuo pasitiki.',
        private: 'Tai privati kūno vieta. Ją galima liesti tik saugiai ir su pagarba tavo riboms.'
      },
      detailed: {
        bodyNormal: 'Kūnas auga, keičiasi ir kartais reaguoja netikėtai. Dėl to gali kilti klausimų, ir tai yra normalu.',
        touchOk: 'Prisilietimas gali būti priimtinas tik tada, kai tu jautiesi saugiai ir pats to nori.',
        touchNo: 'Jei prisilietimas nemalonus, turi teisę pasakyti „ne“, pasitraukti ir kreiptis pagalbos.',
        notSure: 'Kai abejoji, geriausia pasikalbėti su patikimu suaugusiuoju.',
        private: 'Privatūs kūno plotai yra ypatingai asmeniški. Kiti žmonės neturi jų liesti be aiškios ir saugios priežasties.'
      }
    };

    function shouldSpeak() {
      return userProfile.format === 'voice' || userProfile.format === 'visual_voice';
    }

    function speak(text) {
      currentText = text;
      if (!shouldSpeak() || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'lt-LT';
      msg.rate = userProfile.level === 'simple' ? 0.82 : 0.92;
      speechSynthesis.speak(msg);
    }

    function setScene(avatar, text, hint, buttonsHtml, simpleText) {
      document.getElementById('avatar').textContent = avatar;
      document.getElementById('text').textContent = text;
      document.getElementById('hint').textContent = hint || '';
      document.getElementById('buttons').innerHTML = buttonsHtml || '';
      simpleHelpText = simpleText || makeSimpleText(text);
      speak(text);
    }

    function repeatText() {
      speak(currentText);
    }

    function makeSimpleText(text) {
      if (text.includes('kūnas') || text.includes('Kūnas')) return 'Tavo kūnas yra tavo. Jei nepatinka, gali sakyti „ne“.';
      if (text.includes('privati') || text.includes('Privati')) return 'Tai privati vieta. Kiti neturi jos liesti.';
      if (text.includes('ribo') || text.includes('liečia')) return 'Jei tau nemalonu, sakyk „ne“ ir pasitrauk.';
      if (text.includes('pagal')) return 'Jei baisu, pasakyk suaugusiajam, kuriuo pasitiki.';
      return 'Pasakysiu paprasčiau. Rinkis tai, kas tau saugu.';
    }

    function simplifyCurrent() {
      const oldText = currentText;
      document.getElementById('avatar').textContent = '🙂';
      document.getElementById('text').textContent = simpleHelpText;
      document.getElementById('hint').textContent = 'Tai paprastesnis paaiškinimas. Tavo pasirinkimai liko tie patys.';
      speak(simpleHelpText);
      currentText = simpleHelpText;
    }

    function startApp() {
      setScene(
        '🙂',
        'Labas! Aš padėsiu suprasti kūną, jausmus ir ribas.',
        'Pirma atsakyk į kelis klausimus. Tai nėra testas.',
        `<button onclick="askLevel()">Pradėti</button>`
      );
    }

    function askLevel() {
      setScene(
        '🤔',
        'Kaip tau paaiškinti?',
        'Pasirink, kaip tau patogiausia.',
        `
          <button class="green" onclick="setLevel('simple')">🟢 Labai paprastai</button>
          <button onclick="setLevel('medium')">🟡 Paprastai</button>
          <button class="purple" onclick="setLevel('detailed')">🔵 Gali būti daugiau žodžių</button>
        `
      );
    }

    function setLevel(level) {
      userProfile.level = level;
      askFormat();
    }

    function askFormat() {
      setScene(
        '👀',
        'Kaip tau patogiau suprasti?',
        'Galima rinktis paveikslėlius, balsą arba abu.',
        `
          <button onclick="setFormat('visual')">👀 Per paveikslėlius</button>
          <button onclick="setFormat('voice')">🔊 Kai kalba balsu</button>
          <button class="green" onclick="setFormat('visual_voice')">👀🔊 Ir paveikslėliai, ir balsas</button>
        `
      );
    }

    function setFormat(format) {
      userProfile.format = format;
      askMood();
    }

    function askMood() {
      setScene(
        '🙂',
        'Kaip dabar jautiesi?',
        'Tai padės parinkti ramesnį arba įprastą toną.',
        `
          <button class="green" onclick="setMood('good')">🙂 Gerai</button>
          <button class="yellow" onclick="setMood('unsure')">😕 Nežinau</button>
          <button class="purple" onclick="setMood('worried')">😟 Neramu</button>
        `
      );
    }

    function setMood(mood) {
      userProfile.mood = mood;
      goHome();
    }

    function calmPrefix() {
      if (userProfile.mood === 'worried') return 'Viskas gerai. Galime eiti lėtai. ';
      if (userProfile.mood === 'unsure') return 'Gali rinktis po truputį. ';
      return '';
    }

    function goHome() {
      setScene(
        '🙂',
        calmPrefix() + 'Pasirink temą.',
        'Šis prototipas prisitaiko prie tavo pasirinkto paaiškinimo būdo.',
        `
          <button onclick="showBodyMap()">🧍 Mano kūnas</button>
          <button class="purple" onclick="startBoundaryScenario()">✋ Mano ribos</button>
          <button class="green" onclick="startHelpScenario()">🆘 Reikia pagalbos</button>
          <button class="secondary" onclick="askLevel()">⚙️ Pakeisti paaiškinimą</button>
        `
      );
    }

    function understandButton() {
      return `<button class="secondary" onclick="simplifyCurrent()">❓ Nesuprantu</button>`;
    }

    function showBodyMap() {
      const text = calmPrefix() + 'Pasirink kūno vietą.';
      document.getElementById('avatar').textContent = '🧍';
      document.getElementById('text').textContent = text;
      document.getElementById('hint').textContent = 'Paspausk ant pažymėtos kūno vietos.';
      document.getElementById('buttons').innerHTML = `
        <div class="body-map" aria-label="Kūno žemėlapis">
          <div class="head"></div>
          <div class="torso"></div>
          <div class="pelvis"></div>
          <div class="arm left"></div>
          <div class="arm right"></div>
          <div class="leg left"></div>
          <div class="leg right"></div>

          <div class="zone zone-head" onclick="bodyPart('galva')">Galva</div>
          <div class="zone zone-hand-left" onclick="bodyPart('ranka')">Ranka</div>
          <div class="zone zone-hand-right" onclick="bodyPart('ranka')">Ranka</div>
          <div class="zone zone-chest" onclick="bodyPart('krutine')">Krūtinė</div>
          <div class="zone zone-belly" onclick="bodyPart('pilvas')">Pilvas</div>
          <div class="zone zone-private" onclick="bodyPart('privati')">Privati vieta</div>
        </div>
        ${understandButton()}
        <button class="secondary" onclick="goHome()">⬅ Atgal</button>
      `;
      speak(text);
    }

    function bodyPart(part) {
      const t = levelText[userProfile.level];
      let name = 'ši vieta';
      let avatar = '🤔';
      let question = 'Ar tau patinka, kai tave čia liečia?';
      let hint = 'Pasirink, kaip jautiesi.';

      if (part === 'galva') name = 'galva';
      if (part === 'ranka') name = 'ranka';
      if (part === 'krutine') name = 'krūtinė';
      if (part === 'pilvas') name = 'pilvas';

      if (part === 'privati') {
        avatar = '😐';
        question = t.private + ' Ar nori daugiau sužinoti apie ribas?';
        hint = 'Ši vieta yra jautresnė ir asmeniškesnė.';
        setScene(
          avatar,
          question,
          hint,
          `
            <button class="purple" onclick="startBoundaryScenario()">✋ Taip, apie ribas</button>
            <button class="green" onclick="showTrustedAdult()">👤 Paklausti suaugusiojo</button>
            ${understandButton()}
            <button class="secondary" onclick="showBodyMap()">⬅ Atgal prie kūno</button>
          `
        );
        return;
      }

      setScene(
        avatar,
        `Tai yra ${name}. ${question}`,
        hint,
        `
          <button class="green" onclick="touchYes()">👍 Taip</button>
          <button class="red" onclick="touchNo()">🚫 Ne</button>
          <button class="yellow" onclick="touchUnsure()">❓ Nežinau</button>
          ${understandButton()}
          <button class="secondary" onclick="showBodyMap()">⬅ Atgal prie kūno</button>
        `
      );
    }

    function touchYes() {
      const t = levelText[userProfile.level];
      setScene(
        '😊',
        t.touchOk,
        'Svarbu, kad tau būtų saugu ir ramu.',
        `
          <button onclick="showBodyMap()">🧍 Pasirinkti kitą vietą</button>
          <button class="purple" onclick="startBoundaryScenario()">✋ Sužinoti apie ribas</button>
          ${understandButton()}
        `
      );
    }

    function touchNo() {
      const t = levelText[userProfile.level];
      setScene(
        '😌',
        t.touchNo,
        'Tavo kūnas priklauso tau.',
        `
          <button class="purple" onclick="startBoundaryScenario()">✋ Ką daryti toliau?</button>
          <button onclick="showBodyMap()">🧍 Grįžti prie kūno</button>
          ${understandButton()}
        `
      );
    }

    function touchUnsure() {
      const t = levelText[userProfile.level];
      setScene(
        '🙂',
        t.notSure,
        'Nežinoti yra normalu.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Kam galiu pasakyti?</button>
          <button onclick="showBodyMap()">🧍 Grįžti prie kūno</button>
          ${understandButton()}
        `
      );
    }

    function startBoundaryScenario() {
      setScene(
        '😟',
        calmPrefix() + 'Jei tau nemalonu, kai tave liečia, ką gali daryti?',
        'Pasirink saugų veiksmą.',
        `
          <button class="green" onclick="boundaryStop()">✋ Pasakyti „ne“</button>
          <button class="yellow" onclick="boundaryFreeze()">😶 Tylėti</button>
          <button class="purple" onclick="boundaryMoveAway()">🚶 Pasitraukti</button>
          ${understandButton()}
          <button class="secondary" onclick="goHome()">⬅ Atgal</button>
        `
      );
    }

    function boundaryStop() {
      setScene(
        '😌',
        'Teisingai. Tu gali pasakyti „ne“. Tavo ribos yra svarbios.',
        'Atsakymas palaiko teisingą pasirinkimą.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Pasakyti suaugusiajam</button>
          <button onclick="startBoundaryScenario()">🔁 Pakartoti</button>
          ${understandButton()}
        `
      );
    }

    function boundaryFreeze() {
      setScene(
        '🙂',
        'Kartais sunku kalbėti. Bet vėliau svarbu pasakyti patikimam suaugusiajam.',
        'Čia nėra bausmės už netinkamą pasirinkimą.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Kam pasakyti?</button>
          <button onclick="startBoundaryScenario()">🔁 Pabandyti dar kartą</button>
          ${understandButton()}
        `
      );
    }

    function boundaryMoveAway() {
      setScene(
        '😊',
        'Taip. Gali pasitraukti į saugią vietą ir kreiptis pagalbos.',
        'Svarbu išeiti iš nemalonios situacijos.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Kreiptis pagalbos</button>
          <button onclick="startBoundaryScenario()">🔁 Pakartoti</button>
          ${understandButton()}
        `
      );
    }

    function startHelpScenario() {
      setScene(
        '😰',
        calmPrefix() + 'Kai tau baisu arba neaišku, ką gali daryti?',
        'Pasirink vieną atsakymą.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Pasakyti patikimam suaugusiajam</button>
          <button class="yellow" onclick="helpSilent()">🤐 Nieko nesakyti</button>
          <button class="red" onclick="helpRandom()">🎲 Pasakyti nepažįstamam žmogui</button>
          ${understandButton()}
          <button class="secondary" onclick="goHome()">⬅ Atgal</button>
        `
      );
    }

    function showTrustedAdult() {
      setScene(
        '🙂',
        'Gali kreiptis į mamą, tėtį, globėją, mokytoją ar kitą suaugusįjį, kuriuo pasitiki.',
        'Tikroje programėlėje čia galėtų būti kontaktai arba nuotraukos.',
        `
          <button class="green" onclick="fakeCall()">📞 Kviesti pagalbą</button>
          <button onclick="goHome()">🏠 Į meniu</button>
          ${understandButton()}
        `
      );
    }

    function helpSilent() {
      setScene(
        '😐',
        'Kartais norisi tylėti. Bet jei tau baisu, geriau pasakyti žmogui, kuriuo pasitiki.',
        'Minkštai nukreipiame į saugesnį pasirinkimą.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Pasakyti suaugusiajam</button>
          <button onclick="startHelpScenario()">🔁 Pakartoti</button>
          ${understandButton()}
        `
      );
    }

    function helpRandom() {
      setScene(
        '😕',
        'Ne kiekvienas nepažįstamas žmogus yra saugus. Geriau rinktis patikimą suaugusįjį.',
        'Programėlė moko saugaus pasirinkimo.',
        `
          <button class="green" onclick="showTrustedAdult()">👤 Pasirinkti patikimą suaugusįjį</button>
          <button onclick="startHelpScenario()">🔁 Pakartoti</button>
          ${understandButton()}
        `
      );
    }

    function fakeCall() {
      setScene(
        '📞',
        'Pagalba iškviesta. Tikroje versijoje čia būtų ryšys su iš anksto pasirinktu kontaktu.',
        'Prototipui tai parodo pagalbos funkcijos idėją.',
        `
          <button onclick="goHome()">🏠 Grįžti į meniu</button>
          ${understandButton()}
        `
      );
    }

    startApp();
  </script>
</body>
</html>
