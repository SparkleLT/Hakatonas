<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pažinimo pagalbininkas</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: #dbeafe;
      padding: 18px;
      text-align: center;
      font-weight: 800;
      font-size: 22px;
    }

    .screen {
      padding: 20px;
      min-height: 690px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 142px;
      height: 142px;
      border-radius: 50%;
      background: #fef3c7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      border: 6px solid #fde68a;
      user-select: none;
    }



    .avatar svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    #mouth, #browLeft, #browRight, #eyeLeft, #eyeRight {
      transition: all 0.18s ease;
    }

    .bubble {
      width: 100%;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 18px;
      padding: 17px;
      font-size: 22px;
      line-height: 1.35;
      text-align: center;
      min-height: 105px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint {
      color: #6b7280;
      font-size: 15px;
      text-align: center;
      min-height: 20px;
    }

    .buttons {
      width: 100%;
      display: grid;
      gap: 12px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: transform 0.08s ease, opacity 0.15s ease;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: scale(0.98); }

    .secondary { background: #e5e7eb; color: #111827; }
    .green { background: #16a34a; }
    .yellow { background: #ca8a04; }
    .red { background: #dc2626; }
    .purple { background: #7c3aed; }
    .soft { background: #0f766e; }

    .footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      margin-top: auto;
    }

    .footer button {
      font-size: 17px;
      padding: 13px;
    }

    .body-map {
      width: 250px;
      height: 360px;
      position: relative;
      margin: 4px auto 8px;
      border-radius: 20px;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
    }

    .head, .torso, .pelvis, .arm, .leg {
      position: absolute;
      background: #fde68a;
      border: 3px solid #f59e0b;
    }

    .head { width: 66px; height: 66px; border-radius: 50%; left: 92px; top: 18px; }
    .torso { width: 86px; height: 122px; border-radius: 36px 36px 24px 24px; left: 82px; top: 92px; }
    .pelvis { width: 74px; height: 50px; border-radius: 18px 18px 28px 28px; left: 88px; top: 210px; }
    .arm.left { width: 36px; height: 132px; border-radius: 18px; left: 42px; top: 106px; transform: rotate(10deg); }
    .arm.right { width: 36px; height: 132px; border-radius: 18px; right: 42px; top: 106px; transform: rotate(-10deg); }
    .leg.left { width: 38px; height: 92px; border-radius: 18px; left: 82px; top: 256px; }
    .leg.right { width: 38px; height: 92px; border-radius: 18px; right: 82px; top: 256px; }

    .zone {
      position: absolute;
      z-index: 2;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.18);
      border: 2px dashed rgba(37, 99, 235, 0.55);
      color: #1d4ed8;
      font-size: 13px;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      font-weight: 800;
    }

    .zone:hover { background: rgba(37, 99, 235, 0.28); }
    .zone-head { width: 78px; height: 78px; left: 86px; top: 12px; }
    .zone-hand-left { width: 66px; height: 48px; left: 14px; top: 208px; }
    .zone-hand-right { width: 66px; height: 48px; right: 14px; top: 208px; }
    .zone-chest { width: 92px; height: 62px; left: 79px; top: 104px; }
    .zone-belly { width: 92px; height: 58px; left: 79px; top: 164px; }
    .zone-private { width: 94px; height: 58px; left: 78px; top: 222px; background: rgba(220, 38, 38, 0.14); border-color: rgba(220, 38, 38, 0.55); color: #991b1b; }

    .small-note {
      width: 100%;
      background: #eef2ff;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      color: #3730a3;
      text-align: center;
    }

    @media (max-width: 540px) {
      body { padding: 8px; }
      .screen { min-height: 640px; padding: 15px; }
  

    .avatar svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    #mouth, #browLeft, #browRight, #eyeLeft, #eyeRight {
      transition: all 0.18s ease;
    }

    .bubble { font-size: 20px; }
      button { font-size: 19px; }
      .avatar { width: 128px; height: 128px; font-size: 64px; }
      .body-map { transform: scale(0.92); margin: -8px auto -12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">Pažinimo pagalbininkas</div>
    <div class="screen">
      <div class="avatar" id="avatar" aria-label="Pagalbininko avataras">
        <svg id="avatarSvg" width="140" height="140" viewBox="0 0 140 140" role="img" aria-hidden="true">
          <circle cx="70" cy="70" r="55" fill="#fde68a" />
          <circle cx="70" cy="70" r="55" fill="none" stroke="#f59e0b" stroke-width="4" />

          <path id="browLeft" d="M42 45 Q50 41 58 45" stroke="#111827" stroke-width="4" fill="none" stroke-linecap="round" />
          <path id="browRight" d="M82 45 Q90 41 98 45" stroke="#111827" stroke-width="4" fill="none" stroke-linecap="round" />

          <circle id="eyeLeft" cx="50" cy="60" r="6" fill="#111827" />
          <circle id="eyeRight" cx="90" cy="60" r="6" fill="#111827" />

          <path id="mouth" d="M48 88 Q70 108 92 88" stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round" />
          <circle id="cheekLeft" cx="40" cy="76" r="6" fill="#fca5a5" opacity="0.45" />
          <circle id="cheekRight" cx="100" cy="76" r="6" fill="#fca5a5" opacity="0.45" />
        </svg>
      </div>
      <div class="bubble" id="text">Labas! Aš galiu padėti suprasti įvairias situacijas.</div>
      <div class="hint" id="hint">Atsakyk į kelis paprastus klausimus.</div>
      <div class="buttons" id="buttons"></div>
      <div class="footer">
        <button class="secondary" onclick="goHome()">🏠 Pradžia</button>
        <button class="secondary" onclick="repeatText()">🔊 Pakartoti</button>
      </div>
    </div>
  </div>

  <script>
    let currentText = 'Labas! Aš galiu padėti suprasti įvairias situacijas.';
    let simpleHelpText = 'Pasakysiu paprasčiau. Rinkis tai, kas tau saugu.';
    let selectedPart = null;
    let selectedTouchFeeling = null;
    let currentRender = null;

    const userProfile = {
      level: 'medium',
      format: 'visual_voice',
      mood: 'good'
    };

    const bodyParts = {
      galva: {
        label: 'Galva',
        avatar: '🙂',
        intro: {
          simple: 'Galva – nelabai jautri.',
          medium: 'Galva paprastai nėra labai jautri, bet prisilietimas gali būti skirtingas.',
          detailed: 'Galva dažniausiai nėra labai jautri kūno vieta, tačiau kiekvienas žmogus gali jausti prisilietimą skirtingai.'
        },
        q: {
          simple: 'Patinka liesti?',
          medium: 'Ar tau patinka, kai liečia galvą?',
          detailed: 'Pagalvok apie savo jausmą – ar tau patinka, kai tave liečia per galvą?'
        }
      },
      ranka: {
        label: 'Ranka',
        avatar: '🤔',
        intro: {
          simple: 'Ranka – nelabai jautri.',
          medium: 'Ranka dažniausiai nėra labai jautri, bet prisilietimas gali būti malonus arba nemalonus.',
          detailed: 'Ranka nėra labai jautri vieta, tačiau svarbu, kaip tu pats jautiesi, kai tave ten liečia.'
        },
        q: {
          simple: 'Patinka liesti?',
          medium: 'Ar tau patinka, kai liečia ranką?',
          detailed: 'Pagalvok apie savo jausmą – ar tau patinka, kai tave liečia per ranką?'
        }
      },
      krutine: {
        label: 'Krūtinė',
        avatar: '😐',
        intro: {
          simple: 'Krūtinė – jautresnė.',
          medium: 'Krūtinė gali būti jautresnė vieta.',
          detailed: 'Krūtinė gali būti jautresnė ir asmeniškesnė kūno vieta, todėl svarbu, ar jautiesi saugiai.'
        },
        q: {
          simple: 'Saugus prisilietimas?',
          medium: 'Ar tau saugu, kai liečia krūtinę?',
          detailed: 'Pagalvok – ar jautiesi saugiai, kai tave liečia per krūtinę?'
        }
      },
      pilvas: {
        label: 'Pilvas',
        avatar: '🤔',
        intro: {
          simple: 'Pilvas – jautrus.',
          medium: 'Pilvas dažnai yra jautri vieta.',
          detailed: 'Pilvas gali būti jautrus, todėl prisilietimas vienam gali būti malonus, kitam – nemalonus.'
        },
        q: {
          simple: 'Patinka liesti?',
          medium: 'Ar tau patinka, kai liečia pilvą?',
          detailed: 'Pagalvok – ar tau patinka, kai tave liečia per pilvą?'
        }
      },
      privati: {
        label: 'Privati vieta',
        avatar: '😐',
        intro: {
          simple: 'Privati vieta. Ne visi gali liesti.',
          medium: 'Tai privati vieta. Ne visi žmonės gali ją liesti.',
          detailed: 'Tai privati ir asmeniška kūno vieta. Kiti žmonės neturi jos liesti be aiškios priežasties.'
        },
        q: {
          simple: 'Ar visi gali liesti?',
          medium: 'Ar visi gali ją liesti?',
          detailed: 'Kaip manai – ar visi žmonės gali liesti šią vietą?'
        }
      }
    };

    function levelValue(simple, medium, detailed) {
      if (userProfile.level === 'simple') return simple;
      if (userProfile.level === 'detailed') return detailed;
      return medium;
    }

    function shouldSpeak() {
      return userProfile.format === 'voice' || userProfile.format === 'visual_voice';
    }

    function speak(text) {
      currentText = text;
      if (!shouldSpeak() || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'lt-LT';
      msg.rate = userProfile.level === 'simple' ? 0.82 : 0.92;
      speechSynthesis.speak(msg);
    }

    function normalizeEmotion(value) {
      const map = {
        '🙂': 'happy',
        '😊': 'happy',
        '😌': 'calm',
        '🤔': 'thinking',
        '😐': 'serious',
        '😟': 'worried',
        '😰': 'worried',
        '🧍': 'neutral',
        '📞': 'happy',
        happy: 'happy',
        calm: 'calm',
        neutral: 'neutral',
        thinking: 'thinking',
        worried: 'worried',
        serious: 'serious',
        sad: 'sad'
      };
      return map[value] || 'neutral';
    }

    function setAvatarEmotion(emotionValue) {
      const emotion = normalizeEmotion(emotionValue);
      const mouth = document.getElementById('mouth');
      const browLeft = document.getElementById('browLeft');
      const browRight = document.getElementById('browRight');
      const eyeLeft = document.getElementById('eyeLeft');
      const eyeRight = document.getElementById('eyeRight');
      const cheekLeft = document.getElementById('cheekLeft');
      const cheekRight = document.getElementById('cheekRight');

      if (!mouth || !browLeft || !browRight || !eyeLeft || !eyeRight) return;

      const moods = {
        happy: {
          mouth: 'M48 84 Q70 108 92 84',
          browLeft: 'M42 45 Q50 41 58 45',
          browRight: 'M82 45 Q90 41 98 45',
          eyeLeft: { cx: 50, cy: 60, r: 6 },
          eyeRight: { cx: 90, cy: 60, r: 6 },
          cheeks: 0.45
        },
        calm: {
          mouth: 'M50 88 Q70 99 90 88',
          browLeft: 'M42 45 Q50 43 58 45',
          browRight: 'M82 45 Q90 43 98 45',
          eyeLeft: { cx: 50, cy: 60, r: 5.5 },
          eyeRight: { cx: 90, cy: 60, r: 5.5 },
          cheeks: 0.32
        },
        neutral: {
          mouth: 'M52 90 L88 90',
          browLeft: 'M42 45 L58 45',
          browRight: 'M82 45 L98 45',
          eyeLeft: { cx: 50, cy: 60, r: 6 },
          eyeRight: { cx: 90, cy: 60, r: 6 },
          cheeks: 0.18
        },
        thinking: {
          mouth: 'M50 94 Q70 86 90 94',
          browLeft: 'M42 43 Q50 38 58 43',
          browRight: 'M82 47 Q90 44 98 47',
          eyeLeft: { cx: 49, cy: 60, r: 6 },
          eyeRight: { cx: 91, cy: 60, r: 6 },
          cheeks: 0.16
        },
        worried: {
          mouth: 'M50 98 Q70 84 90 98',
          browLeft: 'M42 48 Q50 40 58 48',
          browRight: 'M82 48 Q90 40 98 48',
          eyeLeft: { cx: 50, cy: 61, r: 6.5 },
          eyeRight: { cx: 90, cy: 61, r: 6.5 },
          cheeks: 0.12
        },
        serious: {
          mouth: 'M50 92 L90 92',
          browLeft: 'M42 49 Q50 45 58 47',
          browRight: 'M82 47 Q90 45 98 49',
          eyeLeft: { cx: 50, cy: 60, r: 6 },
          eyeRight: { cx: 90, cy: 60, r: 6 },
          cheeks: 0.08
        },
        sad: {
          mouth: 'M50 100 Q70 82 90 100',
          browLeft: 'M42 49 Q50 42 58 49',
          browRight: 'M82 49 Q90 42 98 49',
          eyeLeft: { cx: 50, cy: 61, r: 6 },
          eyeRight: { cx: 90, cy: 61, r: 6 },
          cheeks: 0.1
        }
      };

      const mood = moods[emotion] || moods.neutral;
      mouth.setAttribute('d', mood.mouth);
      browLeft.setAttribute('d', mood.browLeft);
      browRight.setAttribute('d', mood.browRight);
      eyeLeft.setAttribute('cx', mood.eyeLeft.cx);
      eyeLeft.setAttribute('cy', mood.eyeLeft.cy);
      eyeLeft.setAttribute('r', mood.eyeLeft.r);
      eyeRight.setAttribute('cx', mood.eyeRight.cx);
      eyeRight.setAttribute('cy', mood.eyeRight.cy);
      eyeRight.setAttribute('r', mood.eyeRight.r);
      if (cheekLeft && cheekRight) {
        cheekLeft.setAttribute('opacity', mood.cheeks);
        cheekRight.setAttribute('opacity', mood.cheeks);
      }
    }

    function setScene(avatar, text, hint, buttonsHtml, simpleText) {
      setAvatarEmotion(avatar);
      document.getElementById('text').textContent = text;
      document.getElementById('hint').textContent = hint || '';
      document.getElementById('buttons').innerHTML = buttonsHtml || '';
      simpleHelpText = simpleText || makeSimpleText(text);
      speak(text);
    }

    function repeatText() {
      speak(currentText);
    }

    function makeSimpleText(text) {
      if (text.includes('privati') || text.includes('Privati')) return 'Tai privati vieta. Jei neaišku, pasakyk suaugusiajam.';
      if (text.includes('nepažįstamas') || text.includes('Nepažįstamas')) return 'Su nepažįstamu žmogumi būk atsargus.';
      if (text.includes('nemalonu') || text.includes('nepatinka')) return 'Jei nepatinka, sakyk „ne“.';
      if (text.includes('saug')) return 'Svarbu, kad tau būtų saugu.';
      return 'Pasakysiu paprasčiau. Rinkis tai, kas tau saugu.';
    }

    function simplifyCurrent() {
      if (userProfile.level === 'detailed') {
        userProfile.level = 'medium';
      } else if (userProfile.level === 'medium') {
        userProfile.level = 'simple';
      }

      if (currentRender) {
        currentRender();
        document.getElementById('hint').textContent = 'Bandome paprasčiau.';
        return;
      }

      setAvatarEmotion('happy');
      document.getElementById('text').textContent = simpleHelpText;
      document.getElementById('hint').textContent = 'Bandome paprasčiau.';
      speak(simpleHelpText);
      currentText = simpleHelpText;
    }

    function startApp() {
      currentRender = () => startApp();
      setScene(
        '🙂',
        'Labas! Aš padėsiu suprasti kūną, jausmus ir ribas.',
        'Pirma atsakyk į kelis klausimus. Tai nėra testas.',
        `<button onclick="askLevel()">Pradėti</button>`,
        'Labas. Pradėkime.'
      );
    }

    function askLevel() {
      currentRender = () => askLevel();
      setScene(
        '🤔',
        'Kaip tau paaiškinti?',
        'Pasirink, kaip tau patogiausia.',
        `
          <button class="green" onclick="setLevel('simple')">🟢 Labai paprastai</button>
          <button onclick="setLevel('medium')">🟡 Paprastai</button>
          <button class="purple" onclick="setLevel('detailed')">🔵 Gali būti daugiau žodžių</button>
        `,
        'Kaip paaiškinti?'
      );
    }

    function setLevel(level) {
      userProfile.level = level;
      askFormat();
    }

    function askFormat() {
      currentRender = () => askFormat();
      setScene(
        '👀',
        'Kaip tau patogiau suprasti?',
        'Galima rinktis paveikslėlius, balsą arba abu.',
        `
          <button onclick="setFormat('visual')">👀 Per paveikslėlius</button>
          <button onclick="setFormat('voice')">🔊 Kai kalba balsu</button>
          <button class="green" onclick="setFormat('visual_voice')">👀🔊 Ir paveikslėliai, ir balsas</button>
        `,
        'Kaip tau patogiau?'
      );
    }

    function setFormat(format) {
      userProfile.format = format;
      askMood();
    }

    function askMood() {
      currentRender = () => askMood();
      setScene(
        '🙂',
        'Kaip dabar jautiesi?',
        'Tai padės parinkti ramesnį arba įprastą toną.',
        `
          <button class="green" onclick="setMood('good')">🙂 Gerai</button>
          <button class="yellow" onclick="setMood('unsure')">😕 Nežinau</button>
          <button class="purple" onclick="setMood('worried')">😟 Neramu</button>
        `,
        'Kaip jautiesi?'
      );
    }

    function setMood(mood) {
      userProfile.mood = mood;
      goHome();
    }

    function calmPrefix() {
      if (userProfile.mood === 'worried') return levelValue('Viskas gerai. ', 'Viskas gerai. Galime eiti lėtai. ', 'Viskas gerai. Galime eiti lėtai ir ramiai. ');
      if (userProfile.mood === 'unsure') return levelValue('', 'Gali rinktis po truputį. ', 'Gali rinktis po truputį ir bet kada grįžti atgal. ');
      return '';
    }

    function goHome() {
      currentRender = () => goHome();
      setScene(
        '🙂',
        calmPrefix() + levelValue('Pasirink.', 'Pasirink temą.', 'Pasirink temą, kurią nori suprasti geriau.'),
        'Šis prototipas prisitaiko prie tavo pasirinkto paaiškinimo būdo.',
        `
          <button onclick="showBodyMap()">🧍 Mano kūnas</button>
          <button class="purple" onclick="startBoundaryScenario()">✋ Mano ribos</button>
          <button class="green" onclick="startHelpScenario()">🆘 Reikia pagalbos</button>
          <button class="secondary" onclick="askLevel()">⚙️ Pakeisti paaiškinimą</button>
        `,
        'Pasirink temą.'
      );
    }

    function understandButton() {
      return `<button class="secondary" onclick="simplifyCurrent()">❓ Nesuprantu</button>`;
    }

    function showBodyMap() {
      currentRender = () => showBodyMap();
      selectedPart = null;
      selectedTouchFeeling = null;
      const text = calmPrefix() + levelValue('Pasirink kūno vietą.', 'Pasirink kūno vietą.', 'Pasirink kūno vietą, apie kurią nori sužinoti daugiau.');
      setAvatarEmotion('neutral');
      document.getElementById('text').textContent = text;
      document.getElementById('hint').textContent = 'Paspausk ant pažymėtos kūno vietos.';
      document.getElementById('buttons').innerHTML = `
        <div class="body-map" aria-label="Kūno žemėlapis">
          <div class="head"></div>
          <div class="torso"></div>
          <div class="pelvis"></div>
          <div class="arm left"></div>
          <div class="arm right"></div>
          <div class="leg left"></div>
          <div class="leg right"></div>

          <div class="zone zone-head" onclick="selectBodyPart('galva')">Galva</div>
          <div class="zone zone-hand-left" onclick="selectBodyPart('ranka')">Ranka</div>
          <div class="zone zone-hand-right" onclick="selectBodyPart('ranka')">Ranka</div>
          <div class="zone zone-chest" onclick="selectBodyPart('krutine')">Krūtinė</div>
          <div class="zone zone-belly" onclick="selectBodyPart('pilvas')">Pilvas</div>
          <div class="zone zone-private" onclick="selectBodyPart('privati')">Privati vieta</div>
        </div>
        ${understandButton()}
        <button class="secondary" onclick="goHome()">⬅ Atgal</button>
      `;
      simpleHelpText = 'Pasirink kūno vietą.';
      speak(text);
    }

    function selectBodyPart(partKey) {
      currentRender = () => selectBodyPart(partKey);
      selectedPart = partKey;
      selectedTouchFeeling = null;
      const part = bodyParts[partKey];
      const intro = part.intro[userProfile.level] || part.intro.medium;

      if (partKey === 'privati') {
        privatePartQuestion();
        return;
      }

      const question = part.q[userProfile.level] || part.q.medium;

      setScene(
        part.avatar,
        question,
        'Pasirink pagal savo jausmą.',
        levelValue(
          `
            <button class="green" onclick="touchFeeling('yes')">👍 Taip</button>
            <button class="red" onclick="touchFeeling('no')">🚫 Ne</button>
            <button class="yellow" onclick="touchFeeling('unsure')">❓ Nežinau</button>
            ${understandButton()}
            <button class="secondary" onclick="showBodyMap()">⬅ Atgal</button>
          `,
          `
            <button class="green" onclick="touchFeeling('yes')">👍 Taip</button>
            <button class="red" onclick="touchFeeling('no')">🚫 Ne</button>
            <button class="yellow" onclick="touchFeeling('unsure')">❓ Nežinau</button>

            <button class="red" onclick="boundaryResult('cant_move')">❌ Ne, negaliu pasitraukti</button>

    `
      <button class="green" onclick="fakeCall()">📞 Pagalba</button>
      <button onclick="goHome()">🏠 Į meniu</button>
      ${understandButton()}
    `,
    `
      <button class="green" onclick="fakeCall()">📞 Susisiekti su pagalba</button>
      <button onclick="goHome()">🏠 Grįžti</button>
      ${understandButton()}
    `
  );
}
function speak(text) {
  currentText = text;

  if (!('speechSynthesis' in window)) return;

  const voices = speechSynthesis.getVoices();

  // пробуем найти литовский
  let voice = voices.find(v => v.lang === 'lt-LT');

  // если нет — берём хоть что-то европейское
  if (!voice) {
    voice = voices.find(v => v.lang.includes('lt') || v.lang.includes('pl') || v.lang.includes('de'));
  }

  // если вообще ничего — берём первый
  if (!voice) voice = voices[0];

  const msg = new SpeechSynthesisUtterance(text);
  msg.voice = voice;
  msg.rate = userProfile.level === 'simple' ? 0.85 : 0.95;

  speechSynthesis.speak(msg);
}
